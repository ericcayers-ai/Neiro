<svg xmlns="http://www.w3.org/2000/svg" width="960" height="280" viewBox="0 0 960 280" role="img" aria-label="Neiro CLI quickstart examples">
  <rect width="960" height="280" fill="#0e1116"/>
  <rect x="24" y="24" width="912" height="232" rx="6" fill="#161b22" stroke="#2e3644"/>
  <circle cx="52" cy="52" r="5" fill="#d27a78"/><circle cx="70" cy="52" r="5" fill="#c9a96e"/><circle cx="88" cy="52" r="5" fill="#6a9e8a"/>
  <text x="120" y="57" fill="#6b7380" font-family="IBM Plex Mono, Consolas, monospace" font-size="12">neiro  local engine</text>
  <g font-family="IBM Plex Mono, Consolas, monospace" font-size="14">
    <text x="48" y="100" fill="#6b7380">$</text>
    <text x="68" y="100" fill="#9bb8d4">neiro ui</text>
    <text x="200" y="100" fill="#6b7380"># open the worksuite on 127.0.0.1</text>

    <text x="48" y="132" fill="#6b7380">$</text>
    <text x="68" y="132" fill="#e8ebf0">neiro separate song.flac --preset vocals</text>

    <text x="48" y="164" fill="#6b7380">$</text>
    <text x="68" y="164" fill="#e8ebf0">neiro enhance old.wav --chain dehum,denoise</text>

    <text x="48" y="196" fill="#6b7380">$</text>
    <text x="68" y="196" fill="#e8ebf0">neiro transcribe solo.wav --out solo.mid</text>

    <text x="48" y="228" fill="#6b7380">$</text>
    <text x="68" y="228" fill="#e8ebf0">neiro analyze track.wav</text>
    <text x="300" y="228" fill="#6b7380"># tempo · key · loudness · conditions</text>
  </g>
</svg>
