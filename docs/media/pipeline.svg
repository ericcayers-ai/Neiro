<svg xmlns="http://www.w3.org/2000/svg" width="960" height="220" viewBox="0 0 960 220" role="img" aria-label="Neiro processing pipeline">
  <rect width="960" height="220" fill="#0e1116"/>
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7b9fc4" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#7b9fc4" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="960" height="220" fill="url(#g)"/>
  <text x="32" y="36" fill="#98a0ad" font-family="IBM Plex Sans, Segoe UI, sans-serif" font-size="13" letter-spacing="0.08em">PIPELINE</text>
  <!-- boxes -->
  <g font-family="IBM Plex Sans, Segoe UI, sans-serif" font-size="14" fill="#e8ebf0">
    <rect x="32" y="64" width="120" height="52" rx="4" fill="#161b22" stroke="#2e3644"/>
    <text x="92" y="95" text-anchor="middle">ingest</text>

    <rect x="192" y="64" width="120" height="52" rx="4" fill="#161b22" stroke="#2e3644"/>
    <text x="252" y="95" text-anchor="middle">analyze</text>

    <rect x="352" y="28" width="140" height="44" rx="4" fill="#1e2430" stroke="#7b9fc4"/>
    <text x="422" y="55" text-anchor="middle" fill="#9bb8d4">separate</text>

    <rect x="352" y="88" width="140" height="44" rx="4" fill="#1e2430" stroke="#7b9fc4"/>
    <text x="422" y="115" text-anchor="middle" fill="#9bb8d4">enhance</text>

    <rect x="352" y="148" width="140" height="44" rx="4" fill="#1e2430" stroke="#7b9fc4"/>
