  <g stroke="#7b9fc4" stroke-width="1.5" fill="none">
    <path d="M152 90 H192"/>
    <path d="M312 90 H352"/>
    <path d="M312 90 C330 90 330 50 352 50"/>
    <path d="M312 90 C330 90 330 170 352 170"/>
    <path d="M492 50 H552"/>
