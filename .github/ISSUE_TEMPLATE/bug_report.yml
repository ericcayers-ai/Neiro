name: Bug report
description: Something didn't work as documented
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting. Neiro processes audio locally, so most bugs are
        reproducible from a command and a file description — no need to share audio.
  - type: dropdown
    id: component
    attributes:
      label: Where did this happen?
      description: Which part of the stack surfaced the bug?
      options:
        - CLI (neiro ...)
        - Python engine / DSP / adapters
        - Desktop app (Tauri shell)
        - Frontend / worksuite UI (browser)
        - Local HTTP API (neiro.ui.server)
        - Packaging / installer / launcher
        - Not sure
    validations:
      required: true
  - type: textarea
    id: what-happened
    attributes:
      label: What happened
      description: What did you expect, and what happened instead?
      placeholder: "`neiro separate x.flac` wrote empty stems…"
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: The exact command(s) or UI steps, and a description of the input (format, sample rate, mono/stereo, duration).
      placeholder: |
        1. neiro analyze mix.wav
        2. neiro separate mix.wav --preset 4stem
        Input: 44.1 kHz stereo FLAC, 3:20
    validations:
      required: true
  - type: textarea
    id: output
    attributes:
      label: Output / error
      description: Paste the terminal output. For crashes, the full traceback. For the desktop app, include the engine status shown on the About screen.
      render: shell
  - type: input
    id: version
    attributes:
      label: Neiro version
      description: "`neiro --version`, or the version shown in the app's About screen"
      placeholder: "0.4.0"
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options: [Windows, macOS, Linux]
    validations:
      required: true
  - type: input
    id: python
    attributes:
      label: Python version
      placeholder: "3.12.7"
  - type: input
    id: node
    attributes:
      label: Node.js version (only if the bug is in the frontend build/dev server)
      placeholder: "22.x"
  - type: input
    id: accelerator
    attributes:
      label: GPU / accelerator (if relevant)
      placeholder: "NVIDIA RTX 4070 8 GB / CPU only / Apple M2"
