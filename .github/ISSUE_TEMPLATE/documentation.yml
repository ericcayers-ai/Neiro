name: Documentation
description: Something in the docs is missing, wrong, or unclear
labels: ["documentation"]
body:
  - type: input
    id: location
    attributes:
      label: Where
      description: File and section/heading, or a URL.
      placeholder: "docs/adding-models.md — '2. Write the manifest'"
    validations:
      required: true
  - type: dropdown
    id: kind
    attributes:
      label: What's wrong
      options:
        - Missing — this should be documented but isn't
        - Incorrect — this contradicts the actual behavior
        - Unclear — technically present but hard to follow
        - Outdated — describes a previous version's behavior
    validations:
      required: true
  - type: textarea
    id: details
    attributes:
      label: Details
      description: What does it say, what should it say, and (if you know) what part of the code/UI it should match.
    validations:
      required: true
  - type: checkboxes
    id: willing
    attributes:
      label: Contribution
      options:
        - label: I'd be willing to open a PR fixing this myself
