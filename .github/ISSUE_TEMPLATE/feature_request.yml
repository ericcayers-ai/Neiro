name: Feature request
description: Propose a capability, workflow, or UI improvement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Proposing a specific model to add? Use the
        [Model / adapter proposal](?template=model_adapter.yml) template instead —
        it captures the license and integration details reviewers need.
  - type: textarea
    id: problem
    attributes:
      label: What are you trying to do?
      description: The task or workflow, not the implementation. What's blocked today?
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Separation
        - Transcription
        - Restoration / enhancement
        - Audio editor (Studio)
        - Analysis / auto-detect
        - Desktop app (Tauri shell)
        - Frontend / worksuite UI
        - Accessibility
        - Engine / architecture
        - Packaging / installers
        - Other
    validations:
      required: true
  - type: textarea
    id: notes
    attributes:
      label: Anything else
      description: References, prior art, mockups, roadmap section this relates to.
