name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-python:
    name: Python lint & format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install ruff
        run: pip install ruff
      - name: Ruff check
        run: ruff check .
      - name: Ruff format check
        run: ruff format --check .

  test-python:
    name: Test (${{ matrix.os }}, py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install ffmpeg (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y ffmpeg
      - name: Install package
        run: pip install -e ".[dev]"
      - name: Run tests with coverage
        run: pytest --cov=neiro --cov-report=xml --cov-report=term-missing
      - name: Verify model manifests
        run: python scripts/verify_models.py
      - name: Upload coverage artifact
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml

  frontend:
    name: Frontend lint, typecheck, build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend deps
        working-directory: frontend
        run: npm ci
      - name: Lint
        working-directory: frontend
        run: npm run lint
      - name: Typecheck & build
        working-directory: frontend
        run: npm run build
      - name: Unit / contract tests
        working-directory: frontend
        run: npm run test --if-present
      # Vite outDir is ../src/neiro/ui/static (see frontend/vite.config.ts).
      - name: Assert generated SPA present
        run: test -f src/neiro/ui/static/index.html

  rust:
    name: Rust fmt, clippy, check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Format
        working-directory: src-tauri
        run: cargo fmt --all -- --check
      - name: Clippy
        working-directory: src-tauri
        run: cargo clippy --all-targets -- -D warnings
      - name: Check
        working-directory: src-tauri
        run: cargo check

  packaging-smoke:
    name: Packaging smoke
    runs-on: ubuntu-latest
    needs: [lint-python, test-python, frontend]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Build frontend into static
        run: |
          npm --prefix frontend ci
          npm --prefix frontend run build
          test -f src/neiro/ui/static/index.html
      - name: Build wheel
        run: |
          pip install build
          python -m build --wheel
      - name: Install wheel and smoke CLI
        run: |
          pip install dist/*.whl
          neiro --help
          neiro --version
      - name: Benchmark smoke
        run: python scripts/benchmark.py --smoke || python scripts/benchmark.py --help
